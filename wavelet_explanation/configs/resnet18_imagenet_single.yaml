# ResNet-18 pretrained on ImageNet-1k — single-image explanation mode.
#
# Instead of iterating over the full ImageNet dataset, one image is loaded
# directly from disk via `single_image_path`. The UNet overfits to produce
# the best wavelet-domain explanation for that one image.
#
# Usage:
#   python train.py \
#     --config configs/resnet18_imagenet_single.yaml \
#     --data_path /unused \
#     --output_dir outputs/imagenet_single
#
# Set `single_image_path` to an absolute or relative path to any JPEG/PNG.
# By default the trainer uses the model's own top-1 prediction for all losses.
# Set `fixed_class_label` to an integer class id to force explanation toward
# that class instead.

backbone: vit_b_16
pretrained: true
dataset: imagenet
image_size: 224

single_image_mode: true  # activated automatically when single_image_path is set
fixed_class_label:   # integer class id to explain, e.g. 93 for ImageNet "bee eater"

pixel_mask_mode: true   # true → PixelMaskNet (no wavelets); false → wavelet UNet

batch_size: 1
lr: 1.0e-4
epochs: 500
viz_every: 20             # save explanation & attribution images every N epochs

lambda_act: 1.0
lambda_CE:  4.0       # high — we want the explanation to preserve the top-1 class
lambda_KL:  0.4
lambda_rob: 6.0
lambda_bin: 0.3
lambda_tv:  15.0        # smoothness on wavelet masks
lambda_area_pixel: 15.0  # used only in pixel_mask_mode

# lambda_act: 4.5
# lambda_CE:  15.0       # high — we want the explanation to preserve the top-1 class
# lambda_KL:  5.0
# lambda_rob: 45.0
# lambda_bin: 1.5
# lambda_tv:  57.0        # smoothness on wavelet masks
# lambda_area_pixel: 55.0  # used only in pixel_mask_mode


lambda_gradcam_excl: 000.0  # penalize explanation-mask pixels outside target-class Grad-CAM
gradcam_excl_threshold: 0.5  # Grad-CAM values below this are treated as outside the target region
use_cam_input_filter: false  # true displays/uses a CAM-thresholded input; false uses the raw image
cam_input_method: hirescam  # hirescam or gradcam
cam_input_threshold: 0.6  # CAM values below this are removed from the input passed to the pipeline
gradcam_excl_normalize: false  # true penalizes outside fraction; false penalizes outside area
min_explanation_neighbors: 0  # remove pixels with fewer than this many active neighbours (0 = off)
explanation_active_threshold: 0.0  # pixels below 5% of per-image peak are treated as inactive grey

# Per-subband area weights (sparsity)
disabled_subbands: []
lambda_area_LL: 00.0
lambda_area_LH: 0.0
lambda_area_HL: 0.0
lambda_area_HH: 00.0

wavelet: db8
levels: 1
